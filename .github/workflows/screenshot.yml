name: Screenshot App Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/screenshot.yml'

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK from Release
        run: |
          curl -L -o app.apk \
            "https://github.com/aitogether/parents-weekly-briefing-demo-app/releases/download/v1/parents-weekly-briefing-demo-v1.apk"
          ls -la app.apk

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create screenshots directory
        run: mkdir -p screenshots

      - name: Install APK and take screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            WS="$GITHUB_WORKSPACE"
            mkdir -p "$WS/screenshots"

            # Wait for device fully booted
            adb wait-for-device
            while [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" != "1" ]; do
              sleep 2
            done
            sleep 10
            echo "Device fully booted"

            # Unlock screen
            adb shell input keyevent 82
            sleep 2
            adb shell input keyevent 82
            sleep 1

            # Install APK with grant permissions
            adb install -g app.apk
            echo "APK installed successfully"

            # Launch the app
            adb shell monkey -p com.aitogether.parentswb -c android.intent.category.LAUNCHER 1
            sleep 10

            # === HOME PAGE ===
            adb exec-out screencap -p > "$WS/screenshots/home.png"
            echo "✓ Home page captured"

            # Dump UI hierarchy to find button coordinates
            adb shell uiautomator dump /sdcard/ui_home.xml
            adb pull /sdcard/ui_home.xml "$WS/screenshots/ui_home.xml"
            echo "=== HOME UI DUMP ==="
            cat "$WS/screenshots/ui_home.xml"
            echo "=== END UI DUMP ==="

            # Use Python to parse UI and navigate
            GITHUB_WORKSPACE="$WS" python3 << 'PYEOF'
            import xml.etree.ElementTree as ET
            import subprocess
            import time
            import re
            import os

            ws = os.environ.get('GITHUB_WORKSPACE', '.')
            tree = ET.parse(f'{ws}/screenshots/ui_home.xml')
            root = tree.getroot()

            buttons = []
            for node in root.iter('node'):
                clickable = node.get('clickable', 'false')
                bounds = node.get('bounds', '')
                text = node.get('text', '')
                content_desc = node.get('content-desc', '')
                if clickable == 'true' and bounds:
                    match = re.match(r'\[(\d+),(\d+)\]\[(\d+),(\d+)\]', bounds)
                    if match:
                        x1, y1, x2, y2 = map(int, match.groups())
                        cx, cy = (x1 + x2) // 2, (y1 + y2) // 2
                        buttons.append({
                            'cx': cx, 'cy': cy,
                            'text': text,
                            'desc': content_desc,
                            'bounds': bounds
                        })
                        print(f"Button: text='{text}' desc='{content_desc}' center=({cx},{cy}) bounds={bounds}")

            page_names = ['weekly-briefing', 'medication-mom', 'medication-dad', 'medication-plan']

            for i, name in enumerate(page_names):
                if i < len(buttons):
                    btn = buttons[i]
                    print(f"\n--- Navigating to {name} by clicking ({btn['cx']}, {btn['cy']}) ---")
                    subprocess.run(['adb', 'shell', 'input', 'tap', str(btn['cx']), str(btn['cy'])])
                    time.sleep(5)
                    with open(f'{ws}/screenshots/{name}.png', 'wb') as f:
                        result = subprocess.run(['adb', 'exec-out', 'screencap', '-p'], capture_output=True)
                        f.write(result.stdout)
                    size = len(result.stdout)
                    print(f"✓ {name} captured ({size} bytes)")
                    if size < 1000:
                        print(f"⚠ Screenshot seems too small, might be blank")
                    subprocess.run(['adb', 'shell', 'input', 'keyevent', 'KEYCODE_BACK'])
                    time.sleep(3)
                else:
                    print(f"⚠ Not enough buttons found for {name} (found {len(buttons)} total)")

            print("\n=== All screenshots captured ===")
            PYEOF

            echo "=== Final listing ==="
            ls -la "$WS/screenshots/"
            echo "Total screenshots: $(ls "$WS/screenshots/"*.png 2>/dev/null | wc -l)"

      - name: Upload screenshots as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots
          path: screenshots/
          retention-days: 30
