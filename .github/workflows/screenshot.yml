name: Screenshot App Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/screenshot.yml'

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK from Release
        run: |
          curl -L -o app.apk \
            "https://github.com/aitogether/parents-weekly-briefing-demo-app/releases/download/v1/parents-weekly-briefing-demo-v1.apk"
          ls -la app.apk

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install APK and take screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            mkdir -p screenshots && adb wait-for-device && until [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ]; do sleep 2; done && sleep 10 && adb shell input keyevent 82 && sleep 2 && adb install -g app.apk && adb shell monkey -p com.aitogether.parentswb -c android.intent.category.LAUNCHER 1 && sleep 10 && adb exec-out screencap -p > screenshots/home.png && adb shell uiautomator dump /sdcard/ui.xml && adb pull /sdcard/ui.xml screenshots/ui.xml && python3 scripts/capture_screenshots.py && ls -la screenshots/

      - name: Upload screenshots as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots
          path: screenshots/
          retention-days: 30
